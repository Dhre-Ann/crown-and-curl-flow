# Deploys the Vite app as static files. Use this instead of Jekyll + /docs.
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # Pages serves only static files — API calls must go to a separate backend (secret or Actions variable).
      - name: Check VITE_API_BASE_URL
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || vars.VITE_API_BASE_URL }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "::warning::VITE_API_BASE_URL is not set. The bundle defaults to http://localhost:5000; GitHub Pages users will not reach your API. Add repository secret or variable VITE_API_BASE_URL with your HTTPS API origin (not the github.io Pages URL). Set server CORS_ORIGINS to your Pages origin."
          fi
      - name: Build static site
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || vars.VITE_API_BASE_URL }}
        run: |
          npx vite build --base /${{ github.event.repository.name }}/
          node -e "require('fs').copyFileSync('dist/index.html','dist/404.html')"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
