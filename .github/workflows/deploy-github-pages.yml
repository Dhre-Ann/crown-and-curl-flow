# Deploys the Vite app as static files. Use this instead of Jekyll + /docs.
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # Without VITE_API_BASE_URL, the bundle uses localhost — login/API only works after you add the secret and redeploy.
      - name: Check VITE_API_BASE_URL secret
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "::error::VITE_API_BASE_URL is empty. Add a Repository secret (Settings → Secrets and variables → Actions → New repository secret). Environment-only secrets are NOT visible to this build job. Value example: https://crown-and-curl-flow.onrender.com (no trailing slash)."
          else
            echo "VITE_API_BASE_URL is set for this build (value not shown)."
          fi
      - name: Build static site
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npx vite build --base /${{ github.event.repository.name }}/
          node -e "require('fs').copyFileSync('dist/index.html','dist/404.html')"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
