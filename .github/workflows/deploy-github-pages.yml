# Deploys the Vite app as static files. Use this instead of Jekyll + /docs.
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # Without this secret, Vite embeds http://localhost:5000 — browsers on GitHub Pages will never reach your PC.
      - name: Require VITE_API_BASE_URL secret
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "::error::Set repository secret VITE_API_BASE_URL to your public HTTPS API (e.g. https://your-api.onrender.com, no trailing slash). Then re-run the workflow. Also set CORS_ORIGINS on the API to include https://dhre-ann.github.io"
            exit 1
          fi
      - name: Build static site
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npx vite build --base /${{ github.event.repository.name }}/
          node -e "require('fs').copyFileSync('dist/index.html','dist/404.html')"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
